<!DOCTYPE html>
<html lang="en">

                    <div class="feature-card">
                        <span class="feature-icon">🏠</span>
                        <span class="feature-label">Ngoại Thất</span>
                    </div>
                    <div class="feature-card">

                    </div>
                    <div class="feature-card">

                    </div>
                    <div class="feature-card">
                        <span class="feature-icon">📷</span>
                        <span class="feature-label">Góc Camera</span>
                    </div>
                </div>

                <div class="bottom-info">
                    <div class="info-item">Version: <span id="ver">1.0.0</span></div>
                    <div class="info-item">Updated: <span id="updated">May 2026</span></div>
                    <div class="info-item">Size: <span id="size">134 KB</span></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="minimal-footer">
        <p>Crafted for Architects. Built for SharPix.</p>
