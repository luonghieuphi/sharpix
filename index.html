<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova AI Assistant | Premium Browser Productivity</title>
    <meta name="description" content="AI-powered browser productivity toolkit for modern workflows.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-bg"></div>
    
    <header class="floating-nav">
        <div class="nav-container">
            <div class="logo">
                <div class="logo-icon"></div>
                <span class="brand-name">NOVA <span class="accent">AI</span></span>
            </div>
            <nav class="nav-links">
                <a href="#" class="nav-link">Github</a>
                <a href="#" class="nav-link">Docs</a>
                <a href="#" class="nav-link support-btn">Support</a>
            </nav>
        </div>
    </header>

    <main class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>Extensions</h3>
            </div>
            <div class="product-list" id="productList">
                <!-- Product cards will be injected here by JS -->
            </div>
        </aside>

        <section class="preview-panel" id="previewPanel">
            <div class="preview-content">
                <div class="preview-top">
                    <h1 id="productTitle" class="animate-text">Nova AI Assistant</h1>
                    <p id="productSubtitle" class="animate-text-delayed">AI-powered browser productivity toolkit.</p>
                    <button class="cta-button">
                        <span class="btn-icon"></span>
                        Add to Chrome
                    </button>
                </div>

                <div class="mockup-container">
                    <div class="mockup-glow"></div>
                    <img id="mainMockup" src="assets/nova_ai_mockup.png" alt="Product Mockup" class="floating-mockup">
                    
                    <div class="screenshot-strip" id="screenshotStrip">
                        <!-- Thumbnails injected here -->
                    </div>
                </div>

                <div class="features-grid">
                    <div class="feature-card">
                        <span class="feature-icon">⚡</span>
                        <span class="feature-label">Fast</span>
                    </div>
                    <div class="feature-card">
                        <span class="feature-icon">🔒</span>
                        <span class="feature-label">Secure</span>
                    </div>
                    <div class="feature-card">
                        <span class="feature-icon">🧠</span>
                        <span class="feature-label">AI Powered</span>
                    </div>
                    <div class="feature-card">
                        <span class="feature-icon">☁</span>
                        <span class="feature-label">Cloud Sync</span>
                    </div>
                </div>

                <div class="bottom-info">
                    <div class="info-item">Version: <span id="ver">2.1.0</span></div>
                    <div class="info-item">Updated: <span id="updated">May 2026</span></div>
                    <div class="info-item">Size: <span id="size">4.2MB</span></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="minimal-footer">
        <p>Crafted for Chrome. Built for speed.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
